<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9A7A2E"/>
      <stop offset="40%" stop-color="#E8C97A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="crimsonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a0811"/>
      <stop offset="100%" stop-color="#780e1a"/>
    </linearGradient>
  </defs>

  <!-- Outer decorative ring -->
  <circle cx="240" cy="220" r="195" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="6 5" fill="none" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="240" cy="220" r="170" stroke="#DDD7CC" stroke-width="0.5" fill="none" opacity="0.5"/>

  <!-- Circular arrow / recycling motif (moda circular) -->
  <path d="M240 60 C330 60 400 130 400 220" stroke="url(#goldGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M400 220 C400 310 330 380 240 380" stroke="url(#goldGrad)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M240 380 C150 380 80 310 80 220" stroke="url(#goldGrad)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M80 220 C80 130 150 60 240 60" stroke="url(#goldGrad)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Arrow heads on the arc -->
  <polygon points="400,208 394,224 408,218" fill="url(#goldGrad)" opacity="0.9"/>

  <!-- Hanger icon — centered -->
  <path d="M240 130 C240 130 240 118 252 116 C264 114 268 124 264 130" stroke="url(#goldGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M264 130 L296 158 C310 170 308 186 294 188 L186 188 C172 186 170 170 184 158 L216 130 Z" stroke="url(#goldGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brand name: Reveste-se -->
  <text
    x="240"
    y="270"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-style="italic"
    font-weight="400"
    letter-spacing="1"
    fill="url(#crimsonGrad)"
  >Reveste-se</text>

  <!-- Tagline -->
  <text
    x="240"
    y="300"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="4"
    fill="#9A7A2E"
    opacity="0.85"
  >MODA CIRCULAR</text>

  <!-- Small leaf dots — sustainability accent -->
  <circle cx="240" cy="318" r="1.5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="252" cy="318" r="1.5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="228" cy="318" r="1.5" fill="url(#goldGrad)" opacity="0.7"/>
</svg>
